name: Build desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Electron files
        run: npm run check

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: customer-recovery-console-windows-exe
          path: release/*.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Electron files
        run: npm run check

      - name: Build macOS DMG
        run: npm run dist:mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: customer-recovery-console-macos-dmg
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
